<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch FX — PUDRUS.XYZ</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<nav>
  <a href="../../index.html" class="nav-logo">PUDRUS<span>.xyz</span></a>
  <ul class="nav-links"><li><a href="../../index.html#tools">All Tools</a></li></ul>
</nav>

<div class="tool-layout">
  <div class="tool-panel">
    <div class="tool-panel-header">
      <a href="../../index.html" class="back">← Back</a>
      <h2>▓ Glitch FX</h2>
      <p>RGB shift, scanlines, block corruption and datamosh effects.</p>
    </div>

    <div class="tool-panel-body">
      <!-- Crop Controls -->
      <div class="control-group">
        <span class="control-label">Aspect Ratio</span>
        <div class="control-row">
          <label>Aspect</label>
          <select id="aspectRatio">
            <option value="free">Free</option>
            <option value="1:1">Square (1:1)</option>
            <option value="4:5">Portrait (4:5)</option>
            <option value="9:16">Story (9:16)</option>
          </select>
        </div>
        <div class="control-row">
          <label>Offset X</label>
          <input type="range" id="cropOffsetX" min="-50" max="50" value="0"><span class="val" id="cropOffsetXVal">0%</span>
        </div>
        <div class="control-row">
          <label>Offset Y</label>
          <input type="range" id="cropOffsetY" min="-50" max="50" value="0"><span class="val" id="cropOffsetYVal">0%</span>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">RGB Channel Shift</span>
        <div class="control-row">
          <label>Red X</label>
          <input type="range" id="rShiftX" min="-50" max="50" value="0">
          <span class="val" id="rShiftXVal">0</span>
        </div>
        <div class="control-row">
          <label>Green X</label>
          <input type="range" id="gShiftX" min="-50" max="50" value="0">
          <span class="val" id="gShiftXVal">0</span>
        </div>
        <div class="control-row">
          <label>Blue X</label>
          <input type="range" id="bShiftX" min="-50" max="50" value="0">
          <span class="val" id="bShiftXVal">0</span>
        </div>
        <div class="control-row">
          <label>Y Shift</label>
          <input type="range" id="shiftY" min="-50" max="50" value="0">
          <span class="val" id="shiftYVal">0</span>
        </div>
      </div>

      <hr class="divider">

      <div class="control-group">
        <span class="control-label">Block Corruption</span>
        <div class="control-row">
          <label>Intensity</label>
          <input type="range" id="blockIntensity" min="0" max="100" value="0">
          <span class="val" id="blockIntensityVal">0%</span>
        </div>
        <div class="control-row">
          <label>Size</label>
          <input type="range" id="blockSize" min="5" max="200" value="40">
          <span class="val" id="blockSizeVal">40</span>
        </div>
        <div class="control-row">
          <label>Offset</label>
          <input type="range" id="blockOffset" min="0" max="300" value="80">
          <span class="val" id="blockOffsetVal">80</span>
        </div>
      </div>

      <hr class="divider">

      <div class="control-group">
        <span class="control-label">Scanlines</span>
        <div class="control-row">
          <label>Density</label>
          <input type="range" id="scanDensity" min="0" max="20" value="0">
          <span class="val" id="scanDensityVal">0</span>
        </div>
        <div class="control-row">
          <label>Opacity</label>
          <input type="range" id="scanOpacity" min="0" max="100" value="30">
          <span class="val" id="scanOpacityVal">30%</span>
        </div>
      </div>

      <hr class="divider">

      <div class="control-group">
        <span class="control-label">Color Effects</span>
        <div class="control-row">
          <label>Hue</label>
          <input type="range" id="hueRotate" min="0" max="360" value="0">
          <span class="val" id="hueRotateVal">0°</span>
        </div>
        <div class="control-row">
          <label>Saturation</label>
          <input type="range" id="saturation" min="0" max="300" value="100">
          <span class="val" id="saturationVal">100%</span>
        </div>
        <div class="control-row">
          <label>Brightness</label>
          <input type="range" id="brightness" min="0" max="300" value="100">
          <span class="val" id="brightnessVal">100%</span>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Options</span>
        <div class="toggle-row">
          <label>Invert</label>
          <div class="toggle" id="invertToggle"></div>
        </div>
        <div class="toggle-row">
          <label>Row Shift</label>
          <div class="toggle" id="rowGlitchToggle"></div>
        </div>
      </div>

    </div>

    <div class="status-bar" id="statusBar">◈ No image loaded</div>
    <div class="action-btns">
      <button class="btn btn-primary" id="applyBtn" style="width:100%">◈ Apply Glitch</button>
      <button class="btn btn-outline"  id="randomBtn" style="width:100%">◈ Random Glitch</button>
      <button class="btn btn-outline"  id="resetBtn"  style="width:100%">Reset</button>
      <button class="btn btn-outline" id="sendToFlyerBtn" style="width:100%">→ Continue in Flyer Forge</button>
      <button class="btn btn-outline"  id="exportBtn" style="width:100%">Export PNG</button>
    </div>
  </div>

  <div class="tool-canvas-area" id="canvasArea">
    <div class="file-upload" id="dropZone">
      <span class="icon">▓</span>
      <span>Click or drop an image here</span>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="mainCanvas"></canvas>
    <div class="canvas-info" id="canvasInfo">No image loaded</div>
  </div>
</div>

<script>
let origImageData=null, canvas=document.getElementById('mainCanvas'), ctx=canvas.getContext('2d');
let isInvert=false, rowGlitch=false;
let cropRect = null;

const WORKFLOW_STORAGE_KEY = 'pudrus_workflow_image';

// --- WORKFLOW ──────────────────────────────────────────
function sendTo(toolUrl, canvasElement) {
    if (!canvasElement) {
        console.error('Workflow Error: Canvas element not provided.');
        return;
    }
    let exportCanvas = document.createElement('canvas');
    let exportCtx = exportCanvas.getContext('2d');

    let sx = cropRect ? cropRect.x : 0;
    let sy = cropRect ? cropRect.y : 0;
    let sWidth = cropRect ? cropRect.w : canvasElement.width;
    let sHeight = cropRect ? cropRect.h : canvasElement.height;

    exportCanvas.width = sWidth;
    exportCanvas.height = sHeight;

    exportCtx.drawImage(canvasElement, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
    const dataUrl = exportCanvas.toDataURL('image/png');
    sessionStorage.setItem(WORKFLOW_STORAGE_KEY, dataUrl);
    window.location.href = `../${toolUrl}/index.html`;
}

function receiveImage() {
    const dataUrl = sessionStorage.getItem(WORKFLOW_STORAGE_KEY);
    if (dataUrl) {
        sessionStorage.removeItem(WORKFLOW_STORAGE_KEY);
        return dataUrl;
    }
    return null;
}

// Sliders
[['rShiftX','rShiftXVal'],['gShiftX','gShiftXVal'],['bShiftX','bShiftXVal'],['shiftY','shiftYVal'],
 ['blockIntensity','blockIntensityVal','%'],['blockSize','blockSizeVal'],['blockOffset','blockOffsetVal'],
 ['scanDensity','scanDensityVal'],['scanOpacity','scanOpacityVal','%'],
 ['hueRotate','hueRotateVal','°'],['saturation','saturationVal','%'],['brightness','brightnessVal','%']
].forEach(([id,vid,suf=''])=>{
  document.getElementById(id).addEventListener('input',()=>{
    const inputEl = document.getElementById(id);
    const valEl = document.getElementById(vid);
    if (inputEl && valEl) {
      valEl.textContent = inputEl.value + suf;
    }
  });
  // Set initial value
  const initialValEl = document.getElementById(vid);
  if(initialValEl) initialValEl.textContent = document.getElementById(id).value + suf;
});
[['cropOffsetX','cropOffsetXVal','%'],['cropOffsetY','cropOffsetYVal','%']].forEach(([id,vid,suf])=>{
  let el = document.getElementById(id);
  el.addEventListener('input', ()=> { document.getElementById(vid).textContent = el.value + suf; applyGlitch(); });
});

function toggle(id,cb){let el=document.getElementById(id);el.addEventListener('click',()=>{el.classList.toggle('on');cb(el.classList.contains('on'));});}
toggle('invertToggle',v=>isInvert=v);
toggle('rowGlitchToggle',v=>rowGlitch=v);

// Real-time preview
['rShiftX','gShiftX','bShiftX','shiftY','blockIntensity','blockSize','blockOffset','scanDensity','scanOpacity','hueRotate','saturation','brightness'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    if(origImageData) applyGlitch();
  });
});

function status(m){document.getElementById('statusBar').textContent='◈ '+m;}

let dropZone=document.querySelector('.tool-canvas-area'),fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',e=>{e.preventDefault(); dropZone.style.outline = '1px dashed var(--c1)';});
dropZone.addEventListener('dragleave', () => { dropZone.style.outline = 'none'; });
dropZone.addEventListener('drop',e=>{e.preventDefault(); dropZone.style.outline = 'none'; let f=e.dataTransfer.files[0];if(f)loadFile(f);});
fileInput.addEventListener('change',()=>{if(fileInput.files[0])loadFile(fileInput.files[0]);});

function loadFile(file){
  let img=new Image();
  img.onload=()=>{
    let area=document.getElementById('canvasArea');
    let scale=Math.min((area.clientWidth-40)/img.width,(area.clientHeight-40)/img.height,1);
    canvas.width=img.width; canvas.height=img.height;
    canvas.style.width=(img.width*scale)+'px'; canvas.style.height=(img.height*scale)+'px';
    ctx.drawImage(img,0,0);
    origImageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    document.getElementById('canvasInfo').textContent=img.width+' × '+img.height+' px';
    document.getElementById('canvasArea').classList.add('has-image');
    setupCrop(canvas.width, canvas.height);
    status('Image loaded');
  };

  if (typeof file === 'string') {
      img.src = file; // It's already a data URL
  } else {
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.readAsDataURL(file);
  }
}

function setupCrop(W, H) {
    const aspectRatioSelect = document.getElementById('aspectRatio');
    const offsetXSlider = document.getElementById('cropOffsetX');
    const offsetYSlider = document.getElementById('cropOffsetY');

    function updateCropRect() {
        const ratio = aspectRatioSelect.value;
        if (ratio === 'free') {
            cropRect = null;
            offsetXSlider.disabled = true;
            offsetYSlider.disabled = true;
        } else {
            offsetXSlider.disabled = false;
            offsetYSlider.disabled = false;
            const [w, h] = ratio.split(':').map(Number);
            const targetRatio = w / h;
            const currentRatio = W / H;
            let cropW, cropH, cropX, cropY;
            if (currentRatio > targetRatio) {
                cropH = H;
                cropW = H * targetRatio;
                cropX = (W - cropW) / 2 * (1 - offsetXSlider.value / 50);
                cropY = 0;
            } else {
                cropW = W;
                cropH = W / targetRatio;
                cropX = 0;
                cropY = (H - cropH) / 2 * (1 - offsetYSlider.value / 50);
            }
            cropRect = { x: cropX, y: cropY, w: cropW, h: cropH };
        }
        applyGlitch(); // Redraw with crop overlay
    }
    aspectRatioSelect.addEventListener('change', updateCropRect);
    offsetXSlider.addEventListener('input', updateCropRect);
    offsetYSlider.addEventListener('input', updateCropRect);
    updateCropRect();
}

function drawCropOverlay() {
    if (cropRect) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, cropRect.x, canvas.height);
        ctx.fillRect(cropRect.x + cropRect.w, 0, canvas.width - (cropRect.x + cropRect.w), canvas.height);
        ctx.fillRect(cropRect.x, 0, cropRect.w, cropRect.y);
        ctx.fillRect(cropRect.x, cropRect.y + cropRect.h, cropRect.w, canvas.height - (cropRect.y + cropRect.h));
    }
}

function applyGlitch(){
  if(!origImageData){status('Load an image first');return;}
  status('Processing...');
  setTimeout(()=>{
    const W = origImageData.width, H = origImageData.height;
    let src=new ImageData(new Uint8ClampedArray(origImageData.data),W,H);
    let out=new ImageData(W,H);
    let s=src.data, d=out.data;

    let rSX=parseInt(document.getElementById('rShiftX').value);
    let gSX=parseInt(document.getElementById('gShiftX').value);
    let bSX=parseInt(document.getElementById('bShiftX').value);
    let sY =parseInt(document.getElementById('shiftY').value);
    let bInt=parseInt(document.getElementById('blockIntensity').value)/100;
    let bSz =parseInt(document.getElementById('blockSize').value);
    let bOff=parseInt(document.getElementById('blockOffset').value);
    let scD =parseInt(document.getElementById('scanDensity').value);
    let scO =parseInt(document.getElementById('scanOpacity').value)/100;
    let hue =parseInt(document.getElementById('hueRotate').value);
    let sat =parseInt(document.getElementById('saturation').value)/100;
    let bri =parseInt(document.getElementById('brightness').value)/100;

    // RGB Shift
    for(let y=0;y<H;y++){
      let rowOff = rowGlitch && Math.random()<0.05 ? Math.floor(Math.random()*80-40) : 0;
      for(let x=0;x<W;x++){
        let di=(y*W+x)*4;
        // Red
        let rx=Math.min(W-1,Math.max(0,x+rSX+rowOff)), ry=Math.min(H-1,Math.max(0,y+sY));
        let ri=(ry*W+rx)*4;
        // Green
        let gx=Math.min(W-1,Math.max(0,x+gSX)), gy=Math.min(H-1,Math.max(0,y));
        let gi=(gy*W+gx)*4;
        // Blue
        let bx=Math.min(W-1,Math.max(0,x+bSX)), by2=Math.min(H-1,Math.max(0,y-sY));
        let bi=(by2*W+bx)*4;

        d[di]  =s[ri];
        d[di+1]=s[gi+1];
        d[di+2]=s[bi+2];
        d[di+3]=255;
      }
    }

    // Block corruption
    if(bInt>0){
      let numBlocks=Math.floor(bInt*30);
      for(let n=0;n<numBlocks;n++){
        let bx=Math.floor(Math.random()*W);
        let by=Math.floor(Math.random()*H);
        let bw=Math.floor(Math.random()*bSz+10);
        let bh=Math.floor(Math.random()*bSz*0.3+5);
        let off=Math.floor(Math.random()*bOff-(bOff/2));
        for(let dy=0;dy<bh;dy++){
          for(let dx=0;dx<bw;dx++){
            let tx=bx+dx, ty=by+dy;
            if(tx>=0&&tx<W&&ty>=0&&ty<H){
              let sx2=Math.min(W-1,Math.max(0,tx+off));
              let di=(ty*W+tx)*4, si=(ty*W+sx2)*4;
              d[di]=d[si]; d[di+1]=d[si+1]; d[di+2]=d[si+2];
            }
          }
        }
      }
    }

    // Scanlines
    if(scD>0){
      for(let y=0;y<H;y+=scD){
        for(let x=0;x<W;x++){
          let i=(y*W+x)*4;
          d[i]=Math.floor(d[i]*(1-scO));
          d[i+1]=Math.floor(d[i+1]*(1-scO));
          d[i+2]=Math.floor(d[i+2]*(1-scO));
        }
      }
    }

    // Color effects (brightness + saturation via CSS filter on offscreen canvas)
    ctx.putImageData(out,0,0);
    let filters=[];
    if(bri!==1)   filters.push(`brightness(${bri})`);
    if(sat!==1)   filters.push(`saturate(${sat})`);
    if(hue!==0)   filters.push(`hue-rotate(${hue}deg)`);
    if(isInvert)  filters.push('invert(1)');
    if(filters.length>0){
      let tmp=document.createElement('canvas');
      tmp.width=W; tmp.height=H;
      let tc=tmp.getContext('2d');
      tc.filter=filters.join(' ');
      tc.drawImage(canvas,0,0);
      ctx.clearRect(0,0,W,H);
      ctx.drawImage(tmp,0,0);
    }
    drawCropOverlay();

    status('Done!');
  },10);
}

function randomGlitch(){
  if(!origImageData){status('Load an image first');return;}
  document.getElementById('rShiftX').value=Math.floor(Math.random()*60-30);
  document.getElementById('gShiftX').value=0;
  document.getElementById('bShiftX').value=Math.floor(Math.random()*60-30);
  document.getElementById('shiftY').value=Math.floor(Math.random()*20-10);
  document.getElementById('blockIntensity').value=Math.floor(Math.random()*60);
  document.getElementById('blockSize').value=Math.floor(Math.random()*100+20);
  document.getElementById('blockOffset').value=Math.floor(Math.random()*200);
  document.getElementById('scanDensity').value=Math.random()<0.5?Math.floor(Math.random()*10+2):0;
  document.getElementById('hueRotate').value=Math.floor(Math.random()*360);
  // Update labels
  ['rShiftX','gShiftX','bShiftX','shiftY','blockIntensity','blockSize','blockOffset','scanDensity','hueRotate'].forEach(id=>{
    let el=document.getElementById(id+'Val');
    if(el) el.textContent=document.getElementById(id).value;
  });
  applyGlitch();
}

document.getElementById('applyBtn').addEventListener('click',applyGlitch);
document.getElementById('randomBtn').addEventListener('click',randomGlitch);
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(origImageData){ctx.putImageData(origImageData,0,0);status('Reset');}
  document.getElementById('canvasArea').classList.remove('has-image');
});
document.getElementById('sendToFlyerBtn').addEventListener('click', () => {
    if (!origImageData) { status('Nothing to send'); return; }
    sendTo('flyer-forge', canvas);
});

document.getElementById('exportBtn').addEventListener('click',()=>{
  if(!origImageData){status('Nothing to export');return;}

  let exportCanvas=document.createElement('canvas');
  let exportCtx=exportCanvas.getContext('2d');

  let sx = cropRect ? cropRect.x : 0;
  let sy = cropRect ? cropRect.y : 0;
  let sWidth = cropRect ? cropRect.w : canvas.width;
  let sHeight = cropRect ? cropRect.h : canvas.height;

  exportCanvas.width = sWidth;
  exportCanvas.height = sHeight;

  exportCtx.drawImage(canvas, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);

  let a=document.createElement('a');
  a.download='pudrus_glitch_'+Date.now()+'.png';
  a.href=exportCanvas.toDataURL();
  a.click();
  status('Exported!');
});

document.addEventListener('DOMContentLoaded', () => {
    const incomingImageDataUrl = receiveImage();
    if (incomingImageDataUrl) {
        loadFile(incomingImageDataUrl);
    }
});
</script>
</body>
</html>
