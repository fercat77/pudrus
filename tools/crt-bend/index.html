<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRT Bend — PUDRUS.XYZ</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">PUDRUS<span>.xyz</span></a>
  <ul class="nav-links">
    <li><a href="../../index.html#tools">All Tools</a></li>
  </ul>
</nav>

<div class="tool-layout">

  <!-- ── PANEL ── -->
  <div class="tool-panel">
    <div class="tool-panel-header">
      <a href="../../index.html" class="back" data-i18n="nav.tools">← Atrás</a>
      <h2 data-i18n="crt.name">⏎ CRT Bend</h2>
      <p data-i18n="tools.crt.desc">Emulate CRT screens and analog signal distortion.</p>
    </div>

    <div class="tool-panel-body">

      <!-- Export Controls -->
      <div class="control-group">
        <span class="control-label" data-i18n="crt.aspectRatio">Aspect Ratio</span>
        <div class="control-row">
          <label data-i18n="crt.aspect">Aspect</label>
          <select id="aspectRatio">
            <option value="free">Free</option>
            <option value="1:1">Square (1:1)</option>
            <option value="4:5">Portrait (4:5)</option>
            <option value="9:16">Story (9:16)</option>
          </select>
        </div>
        <div class="control-row">
          <label data-i18n="crt.offsetX">Offset X</label>
          <input type="range" id="cropOffsetX" min="-50" max="50" value="0"><span class="val" id="cropOffsetXVal">0%</span>
        </div>
        <div class="control-row">
          <label data-i18n="crt.offsetY">Offset Y</label>
          <input type="range" id="cropOffsetY" min="-50" max="50" value="0"><span class="val" id="cropOffsetYVal">0%</span>
        </div>
      </div>

      <hr class="divider">

      <!-- CRT Screen Effects -->
      <div class="control-group">
        <span class="control-label" data-i18n="crt.screenFx">CRT Screen FX</span>
        <div class="control-row">
          <label data-i18n="crt.curvature">Curvature</label>
          <input type="range" id="curvature" min="0" max="20" value="5">
          <span class="val" id="curvatureVal">5</span>
        </div>
        <div class="control-row">
          <label data-i18n="crt.scanlines">Scanlines</label>
          <input type="range" id="scanlines" min="0" max="1" step="0.05" value="0.2">
          <span class="val" id="scanlinesVal">0.2</span>
        </div>
        <div class="control-row">
          <label data-i18n="crt.vignette">Vignette</label>
          <input type="range" id="vignette" min="0" max="1" step="0.05" value="0.3">
          <span class="val" id="vignetteVal">0.3</span>
        </div>
      </div>

      <!-- Signal Distortion -->
      <div class="control-group">
        <span class="control-label" data-i18n="crt.distortion">Signal Distortion</span>
        <div class="control-row">
          <label data-i18n="crt.noise">Noise</label>
          <input type="range" id="noise" min="0" max="0.5" step="0.01" value="0.1">
          <span class="val" id="noiseVal">0.1</span>
        </div>
        <div class="control-row">
          <label data-i18n="crt.lineWarp">Line Warp</label>
          <input type="range" id="lineWarp" min="0" max="20" value="0">
          <span class="val" id="lineWarpVal">0</span>
        </div>
        <div class="control-row">
          <label data-i18n="crt.vsync">V-Sync Roll</label>
          <input type="range" id="vsync" min="0" max="1" step="0.01" value="0">
          <span class="val" id="vsyncVal">0</span>
        </div>
      </div>

      <!-- Color Effects -->
      <div class="control-group">
        <span class="control-label" data-i18n="crt.colorFx">Color FX</span>
        <div class="control-row">
          <label data-i18n="crt.aberration">Aberration</label>
          <input type="range" id="aberration" min="0" max="20" value="2">
          <span class="val" id="aberrationVal">2</span>
        </div>
        <div class="control-row">
          <label data-i18n="crt.bloom">Bloom</label>
          <input type="range" id="bloom" min="0" max="1" step="0.05" value="0.1">
          <span class="val" id="bloomVal">0.1</span>
        </div>
      </div>

    </div>

    <div class="status-bar" id="statusBar" data-i18n="crt.statusNoImage">◈ No image loaded</div>

    <div class="action-btns">
      <button class="btn btn-primary" id="applyBtn" style="width:100%" data-i18n="crt.applyBtn">◈ Apply FX</button>
      <button class="btn btn-outline" id="resetBtn" style="width:100%" data-i18n="crt.resetBtn">Reset</button>
      <button class="btn btn-outline" id="sendToFlyerBtn" style="width:100%" data-i18n="crt.continueBtn">→ Continue in Flyer Forge</button>
      <button class="btn btn-outline" id="exportBtn" style="width:100%" data-i18n="crt.exportBtn">Export PNG</button>
    </div>
  </div>

  <!-- ── CANVAS ── -->
  <div class="tool-canvas-area" id="canvasArea">
    <div class="file-upload" id="dropZone">
      <span class="icon">📺</span>
      <span data-i18n="crt.fileDrop">Click or drop an image here</span>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="mainCanvas"></canvas>
    <div class="canvas-info" id="canvasInfo">No image loaded</div>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  // State and Canvas setup
  let origImageData = null;
  let img = null;
  let canvas = document.getElementById('mainCanvas');
  let ctx = canvas.getContext('2d');
  let cropRect = null;

  const WORKFLOW_STORAGE_KEY = 'pudrus_workflow_image';

  // --- WORKFLOW ──────────────────────────────────────────
  function sendTo(toolUrl, canvasElement) {
      if (!canvasElement) {
          console.error('Workflow Error: Canvas element not provided.');
          return;
      }
      let exportCanvas = document.createElement('canvas');
      let exportCtx = exportCanvas.getContext('2d');

      let sx = cropRect ? cropRect.x : 0;
      let sy = cropRect ? cropRect.y : 0;
      let sWidth = cropRect ? cropRect.w : canvasElement.width;
      let sHeight = cropRect ? cropRect.h : canvasElement.height;

      exportCanvas.width = sWidth;
      exportCanvas.height = sHeight;

      exportCtx.drawImage(canvasElement, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
      const dataUrl = exportCanvas.toDataURL('image/png');
      sessionStorage.setItem(WORKFLOW_STORAGE_KEY, dataUrl);
      window.location.href = `../${toolUrl}/index.html`;
  }

  function receiveImage() {
      const dataUrl = sessionStorage.getItem(WORKFLOW_STORAGE_KEY);
      if (dataUrl) {
          sessionStorage.removeItem(WORKFLOW_STORAGE_KEY);
          return dataUrl;
      }
      return null;
  }

  // UI Helpers
  function setupSlider(id, valId, suffix = '') {
    const sliderEl = document.getElementById(id);
    const valEl = document.getElementById(valId);
    if (sliderEl && valEl) {
      sliderEl.addEventListener('input', () => {
        valEl.textContent = sliderEl.value + suffix;
        scheduleRender();
      });
      // Set initial value
      valEl.textContent = sliderEl.value + suffix;
    }
  }

  ['curvature', 'scanlines', 'vignette', 'noise', 'lineWarp', 'vsync', 'aberration', 'bloom'].forEach(id => {
    setupSlider(id, id + 'Val');
  });
  [['cropOffsetX','cropOffsetXVal','%'],['cropOffsetY','cropOffsetYVal','%']].forEach(([id,valId,suf])=>{
    let el = document.getElementById(id);
    el.addEventListener('input', ()=> { document.getElementById(valId).textContent = el.value + suf; scheduleRender(); });
  });

  function status(msg) {
    document.getElementById('statusBar').textContent = '◈ ' + msg;
  }

  // File Loading
  const dropZone = document.querySelector('.tool-canvas-area');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--c1)'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    img = new Image();
    img.onload = () => {
      const area = document.getElementById('canvasArea');
      const maxW = area.clientWidth - 40;
      const maxH = area.clientHeight - 40;
      const scale = Math.min(maxW / img.width, maxH / img.height, 1);
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.style.width = (img.width * scale) + 'px';
      canvas.style.height = (img.height * scale) + 'px';
      ctx.drawImage(img, 0, 0);
      origImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      document.getElementById('canvasInfo').textContent = `${img.width} × ${img.height} px`;
      document.getElementById('canvasArea').classList.add('has-image');
      document.getElementById('canvasInfo').style.display = 'block';
      setupCrop(canvas.width, canvas.height);
      status('Image loaded. Ready to apply effects.');
    };

    if (typeof file === 'string') {
        img.src = file; // It's already a data URL
    } else {
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
    }
  }
  
  function setupCrop(W, H) {
      const aspectRatioSelect = document.getElementById('aspectRatio');
      const offsetXSlider = document.getElementById('cropOffsetX');
      const offsetYSlider = document.getElementById('cropOffsetY');
      function updateCropRect() {
          const ratio = aspectRatioSelect.value;
          if (ratio === 'free') {
              cropRect = null;
              offsetXSlider.disabled = true;
              offsetYSlider.disabled = true;
          } else {
              offsetXSlider.disabled = false;
              offsetYSlider.disabled = false;
              const [w, h] = ratio.split(':').map(Number);
              const targetRatio = w / h;
              const currentRatio = W / H;
              let cropW, cropH, cropX, cropY;
              if (currentRatio > targetRatio) {
                  cropH = H;
                  cropW = H * targetRatio;
                  cropX = (W - cropW) / 2 * (1 - offsetXSlider.value / 50);
                  cropY = 0;
              } else {
                  cropW = W;
                  cropH = W / targetRatio;
                  cropX = 0;
                  cropY = (H - cropH) / 2 * (1 - offsetYSlider.value / 50);
              }
              cropRect = { x: cropX, y: cropY, w: cropW, h: cropH };
          }
          scheduleRender(); // Redraw with crop overlay
      }
      aspectRatioSelect.addEventListener('change', updateCropRect);
      offsetXSlider.addEventListener('input', updateCropRect);
      offsetYSlider.addEventListener('input', updateCropRect);
      updateCropRect();
  }

  function drawCropOverlay() {
      if (cropRect) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(0, 0, cropRect.x, canvas.height);
          ctx.fillRect(cropRect.x + cropRect.w, 0, canvas.width - (cropRect.x + cropRect.w), canvas.height);
          ctx.fillRect(cropRect.x, 0, cropRect.w, cropRect.y);
          ctx.fillRect(cropRect.x, cropRect.y + cropRect.h, cropRect.w, canvas.height - (cropRect.y + cropRect.h));
      }
  }

  // --- Main CRT Effect Logic ---
  let renderScheduled = false;

  function scheduleRender() {
    if (!origImageData || renderScheduled) return;
    renderScheduled = true;
    requestAnimationFrame(() => {
      applyCrtEffects();
      renderScheduled = false;
    });
  }

  function applyCrtEffects() {
    if (!origImageData) {
      status('Please load an image first.');
      return;
    }
    status('Processing...');

      const W = canvas.width;
      const H = canvas.height;

      const src = origImageData;
      const out = ctx.createImageData(W, H);
      const s = src.data;
      const d = out.data;

      // Get slider values
      const curvature = parseFloat(document.getElementById('curvature').value) * 0.05;
      const scanlines = parseFloat(document.getElementById('scanlines').value);
      const vignette = 1.0 - parseFloat(document.getElementById('vignette').value);
      const noise = parseFloat(document.getElementById('noise').value);
      const lineWarp = parseFloat(document.getElementById('lineWarp').value);
      const vsync = parseFloat(document.getElementById('vsync').value) * H;
      const aberration = parseFloat(document.getElementById('aberration').value);
      const bloom = parseFloat(document.getElementById('bloom').value);

      const halfW = W / 2;
      const halfH = H / 2;

      for (let y = 0; y < H; y++) {
        const warpedY = y + Math.sin(y / (H / 10) + performance.now() / 1000) * lineWarp;
        for (let x = 0; x < W; x++) {
          // --- Curvature ---
          const dx = x - halfW;
          const dy = y - halfH;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const lensFactor = 1.0 + (dist / Math.min(halfW, halfH)) * curvature;
          const u = halfW + dx / lensFactor;
          const v = halfH + dy / lensFactor;

          // --- V-Sync Roll ---
          const rolledV = (v + vsync) % H;

          // --- Chromatic Aberration ---
          const sampleX = Math.round(u);
          const sampleY = Math.round(rolledV);

          const rX = Math.max(0, Math.min(W - 1, sampleX + aberration));
          const bX = Math.max(0, Math.min(W - 1, sampleX - aberration));

          const rIdx = (sampleY * W + rX) * 4;
          const gIdx = (sampleY * W + sampleX) * 4;
          const bIdx = (sampleY * W + bX) * 4;

          let r = s[rIdx];
          let g = s[gIdx + 1];
          let b = s[bIdx + 2];

          // --- Scanlines & Vignette ---
          const vignetteFactor = (Math.cos(dx / W * Math.PI) * Math.cos(dy / H * Math.PI));
          const scanlineFactor = y % 2 === 0 ? 1.0 : 1.0 - scanlines;
          const finalFactor = scanlineFactor * Math.max(vignette, vignetteFactor);

          r *= finalFactor;
          g *= finalFactor;
          b *= finalFactor;

          // --- Noise ---
          const noiseFactor = (Math.random() - 0.5) * noise * 255;
          r += noiseFactor;
          g += noiseFactor;
          b += noiseFactor;

          // --- Bloom (simple brightness boost) ---
          r += bloom * r;
          g += bloom * g;
          b += bloom * b;

          const outIdx = (y * W + x) * 4;
          d[outIdx] = r;
          d[outIdx + 1] = g;
          d[outIdx + 2] = b;
          d[outIdx + 3] = 255;
        }
      }
      ctx.putImageData(out, 0, 0);
      drawCropOverlay();
      status('CRT effects applied!');
  }

  document.getElementById('applyBtn').addEventListener('click', scheduleRender);

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (origImageData) {
      ctx.putImageData(origImageData, 0, 0);
      status('Image reset.');
    }
  });

  document.getElementById('sendToFlyerBtn').addEventListener('click', () => {
      if (!origImageData) { status('Nothing to send'); return; }
      sendTo('flyer-forge', canvas, cropRect);
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    if (!origImageData) {
      status('Nothing to export.');
      return;
    }
    
    let exportCanvas = document.createElement('canvas');
    let exportCtx = exportCanvas.getContext('2d');

    let sx = cropRect ? cropRect.x : 0;
    let sy = cropRect ? cropRect.y : 0;
    let sWidth = cropRect ? cropRect.w : canvas.width;
    let sHeight = cropRect ? cropRect.h : canvas.height;

    exportCanvas.width = sWidth;
    exportCanvas.height = sHeight;

    exportCtx.drawImage(canvas, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);

    const link = document.createElement('a');
    link.download = `pudrus_crt-bend_${Date.now()}.png`;
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
    status('Exported!');
  });

  // Check for incoming image from workflow
  const incomingImageDataUrl = receiveImage();
  if (incomingImageDataUrl) {
      loadFile(incomingImageDataUrl);
  }

});
</script>
</body>
</html>
