<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Canvas — PUDRUS.XYZ</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">PUDRUS<span>.xyz</span></a>
  <ul class="nav-links">
    <li><a href="../../index.html#tools" data-i18n="nav.tools">All Tools</a></li>
  </ul>
</nav>

<div class="tool-layout">
  <!-- PANEL -->
  <div class="tool-panel">
    <div class="tool-panel-header">
      <a href="../../index.html" class="back">← Back</a>
      <h2 data-i18n="tools.ascii.name">◊ ASCII Canvas</h2>
      <p data-i18n="tools.ascii.desc">Transform images into creative ASCII art with custom characters and effects.</p>
    </div>

    <div class="tool-panel-body">
      <!-- Upload -->
      <!-- Crop Controls -->
      <div class="control-group">
        <span class="control-label">Aspect Ratio</span>
        <div class="control-row">
          <label>Aspect</label>
          <select id="aspectRatio">
            <option value="free">Free</option>
            <option value="1:1">Square (1:1)</option>
            <option value="4:5">Portrait (4:5)</option>
            <option value="9:16">Story (9:16)</option>
          </select>
        </div>
        <div class="control-row">
          <label>Offset X</label>
          <input type="range" id="cropOffsetX" min="-50" max="50" value="0"><span class="val" id="cropOffsetXVal">0%</span>
        </div>
        <div class="control-row">
          <label>Offset Y</label>
          <input type="range" id="cropOffsetY" min="-50" max="50" value="0"><span class="val" id="cropOffsetYVal">0%</span>
        </div>
      </div>

      <hr class="divider">

      <!-- Granularity -->
      <div class="control-group">
        <span class="control-label" data-i18n="ascii.granularity">Granularity</span>
        <div class="control-row">
          <label>Size</label>
          <input type="range" id="charSize" min="2" max="16" value="6">
          <span class="val" id="charSizeVal">6px</span>
        </div>
        <div class="control-row">
          <label>Spacing</label>
          <input type="range" id="lineSpacing" min="0.8" max="1.6" step="0.1" value="1.2">
          <span class="val" id="lineSpacingVal">1.2x</span>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label" data-i18n="ascii.charSet">Character Set</span>
        <div class="char-preset">
          <button class="preset-btn active" data-preset="standard" data-i18n="ascii.presetStandard">Standard</button>
          <button class="preset-btn" data-preset="extended" data-i18n="ascii.presetExtended">Extended</button>
          <button class="preset-btn" data-preset="minimal" data-i18n="ascii.presetMinimal">Minimal</button>
          <button class="preset-btn" data-preset="blocks" data-i18n="ascii.presetBlocks">Blocks</button>
          <button class="preset-btn" data-preset="dense" data-i18n="ascii.presetDense">Dense</button>
          <button class="preset-btn" data-preset="custom" data-i18n="ascii.presetCustom">Custom</button>
        </div>
        <div class="control-row custom-char-row" id="customCharRow" style="display: none;">
          <label>Chars</label>
          <input type="text" id="customChars" placeholder="@%#*+=-:." maxlength="50">
        </div>
      </div>

      <hr class="divider">

      <!-- Effects -->
      <div class="control-group">
        <span class="control-label" data-i18n="ascii.effects">Effects</span>
        <div class="control-row">
          <label data-i18n="ascii.contrast">Contrast</label>
          <input type="range" id="contrast" min="-50" max="100" value="0">
          <span class="val" id="contrastVal">0</span>
        </div>
        <div class="control-row">
          <label data-i18n="ascii.brightness">Brightness</label>
          <input type="range" id="brightness" min="-50" max="50" value="0">
          <span class="val" id="brightnessVal">0</span>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label" data-i18n="ascii.colorMode">Color Mode</span>
        <select id="colorMode">
          <option value="mono" data-i18n="ascii.colorMono">Monochrome</option>
          <option value="original" data-i18n="ascii.colorOriginal">Original Colors</option>
          <option value="inverted" data-i18n="ascii.colorInverted">Inverted</option>
          <option value="cyan" data-i18n="ascii.colorCyan">Cyan</option>
          <option value="green" data-i18n="ascii.colorGreen">Green Terminal</option>
        </select>
      </div>

      <hr class="divider">


      <!-- Actions -->
      <div class="action-btns">
        <button class="btn btn-primary" id="randomizeBtn" data-i18n="ascii.randomize">◈ Randomize Set</button>
        <button class="btn btn-primary" id="applyBtn" data-i18n="ascii.apply">◈ Apply</button>
        <button class="btn btn-outline" id="sendToFlyerBtn" style="width:100%">→ Continue in Flyer Forge</button>
        <button class="btn btn-outline" id="downloadBtn" data-i18n="ascii.download">⬇ Download PNG</button>
      </div>
    </div>

    <div class="status-bar" id="statusBar">◈ <span data-i18n="ascii.ready">Ready</span></div>
  </div>

  <!-- CANVAS -->
  <div class="tool-canvas-area" id="canvasArea">
    <div class="file-upload" id="dropZone">
        <span class="icon">◊</span>
        <span data-i18n="ascii.fileDrop">Click or drop an image here</span>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="asciiCanvas"></canvas>
    <div class="canvas-info" id="canvasInfo">No image loaded</div>
  </div>
</div>

<script src="../../js/i18n.js"></script>
<script>
  // Configuration & State
  let imageData = null;
  let currentPreset = 'standard';
  let currentChars = '@%#*+=-:. ';
  let cropRect = null;

  const charPresets = {
    standard: '@%#*+=-:. ',
    extended: '@%#*+=-:.\'"`,\'^"^"|/\\\\()[]{}',
    minimal: '@#*:. ',
    blocks: '████▓▒░  ',
    dense: '@@@%%%###***+++===---:::...   ',
  };

  const canvas = document.getElementById('asciiCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.querySelector('.tool-canvas-area');
  const statusBar = document.getElementById('statusBar');
  const canvasInfo = document.getElementById('canvasInfo');

  const WORKFLOW_STORAGE_KEY = 'pudrus_workflow_image';

  // --- WORKFLOW ──────────────────────────────────────────
  function sendTo(toolUrl, canvasElement) {
      if (!canvasElement) {
          console.error('Workflow Error: Canvas element not provided.');
          return;
      }
      let exportCanvas = document.createElement('canvas');
      let exportCtx = exportCanvas.getContext('2d');

      let sx = cropRect ? cropRect.x : 0;
      let sy = cropRect ? cropRect.y : 0;
      let sWidth = cropRect ? cropRect.w : canvasElement.width;
      let sHeight = cropRect ? cropRect.h : canvasElement.height;

      exportCanvas.width = sWidth;
      exportCanvas.height = sHeight;

      exportCtx.drawImage(canvasElement, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
      const dataUrl = exportCanvas.toDataURL('image/png');
      sessionStorage.setItem(WORKFLOW_STORAGE_KEY, dataUrl);
      window.location.href = `../${toolUrl}/index.html`;
  }

  function receiveImage() {
      const dataUrl = sessionStorage.getItem(WORKFLOW_STORAGE_KEY);
      if (dataUrl) {
          sessionStorage.removeItem(WORKFLOW_STORAGE_KEY);
          return dataUrl;
      }
      return null;
  }

  // File handling
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.style.borderColor = 'var(--c1)';
  });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file) loadImage(file);
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadImage(file);
  });

  function loadImage(file) {
    const img = new Image();
    img.onload = () => {
      imageData = { img, width: img.width, height: img.height };
      canvasInfo.textContent = img.width + ' × ' + img.height + ' px';
      document.getElementById('canvasArea').classList.add('has-image');
      setupCrop(imageData.width, imageData.height);
      updateStatus('Image loaded. Click Apply.');
      renderPreview();
    };

    if (typeof file === 'string') {
        img.src = file; // It's already a data URL
    } else {
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
    }
  }

  function setupCrop(W, H) {
      const aspectRatioSelect = document.getElementById('aspectRatio');
      const offsetXSlider = document.getElementById('cropOffsetX');
      const offsetYSlider = document.getElementById('cropOffsetY');

      function updateCropRect() {
          const ratio = aspectRatioSelect.value;
          if (ratio === 'free') {
              cropRect = null;
              offsetXSlider.disabled = true;
              offsetYSlider.disabled = true;
          } else {
              offsetXSlider.disabled = false;
              offsetYSlider.disabled = false;
              const [w, h] = ratio.split(':').map(Number);
              const targetRatio = w / h;
              const currentRatio = W / H;
              let cropW, cropH, cropX, cropY;
              if (currentRatio > targetRatio) {
                  cropH = H;
                  cropW = H * targetRatio;
                  cropX = (W - cropW) / 2 * (1 - offsetXSlider.value / 50);
                  cropY = 0;
              } else {
                  cropW = W;
                  cropH = W / targetRatio;
                  cropX = 0;
                  cropY = (H - cropH) / 2 * (1 - offsetYSlider.value / 50);
              }
              cropRect = { x: cropX, y: cropY, w: cropW, h: cropH };
          }
          renderPreview();
      }
      aspectRatioSelect.addEventListener('change', updateCropRect);
      offsetXSlider.addEventListener('input', updateCropRect);
      offsetYSlider.addEventListener('input', updateCropRect);
      updateCropRect();
  }

  function drawCropOverlay() {
      if (cropRect) {
          // ASCII canvas is different, we can't just draw over it.
          // This will be handled by only drawing inside the crop rect.
          // For now, we'll just log it.
          // A visual overlay would require a second canvas on top.
      }
  }

  function updateLabel(id, value) {
    document.getElementById(id).textContent = value;
  }

  // Render ASCII
  function renderPreview() {
    if (!imageData) return;

    const charSize = parseInt(document.getElementById('charSize').value);
    const lineSpacing = parseFloat(document.getElementById('lineSpacing').value);
    const contrast = parseInt(document.getElementById('contrast').value);
    const brightness = parseInt(document.getElementById('brightness').value);
    const colorMode = document.getElementById('colorMode').value;

    let sourceX = cropRect ? cropRect.x : 0;
    let sourceY = cropRect ? cropRect.y : 0;
    let sourceWidth = cropRect ? cropRect.w : imageData.width;
    let sourceHeight = cropRect ? cropRect.h : imageData.height;


    // Get container size to fit canvas
    const container = document.querySelector('.tool-canvas-area');
    const maxW = container.clientWidth - 40;
    const maxH = container.clientHeight - 40;

    // Calculate grid dimensions based on container and char size
    const gridW = Math.floor(maxW / charSize);
    const gridH = Math.floor(maxH / (charSize * lineSpacing));

    // Maintain image aspect ratio
    const imgAspectRatio = sourceHeight / sourceWidth;
    let width = gridW;
    let height = Math.round(width * imgAspectRatio / lineSpacing);

    if (height > gridH) {
      height = gridH;
      width = Math.round(height * lineSpacing / imgAspectRatio);
    }

    // Set canvas size
    canvas.width = width * charSize;
    canvas.height = height * charSize * lineSpacing;
    
    // Store the actual ASCII dimensions for export
    canvas.asciiWidth = width;
    canvas.asciiHeight = height;
    
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Resize and process image
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = width;
    tempCanvas.height = height;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(imageData.img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, width, height);

    const imgData = tempCtx.getImageData(0, 0, width, height);
    const data = imgData.data;

    ctx.font = `${charSize}px monospace`;
    ctx.textBaseline = 'top';

    for (let i = 0; i < width * height; i++) {
      const r = data[i * 4];
      const g = data[i * 4 + 1];
      const b = data[i * 4 + 2];
      const a = data[i * 4 + 3];

      let gray = (r * 0.299 + g * 0.587 + b * 0.114);
      gray = Math.max(0, Math.min(255, gray + brightness));
      gray = Math.pow(gray / 255, 1 - contrast / 100) * 255;

      const charIndex = Math.floor((gray / 255) * (currentChars.length - 1));
      const char = currentChars[charIndex];

      const x = (i % width) * charSize;
      const y = Math.floor(i / width) * charSize * lineSpacing;

      // Color
      if (colorMode === 'mono') {
        ctx.fillStyle = `rgba(0, 212, 255, ${a / 255})`;
      } else if (colorMode === 'original') {
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
      } else if (colorMode === 'inverted') {
        ctx.fillStyle = `rgba(${255 - r}, ${255 - g}, ${255 - b}, ${a / 255})`;
      } else if (colorMode === 'cyan') {
        const intensity = gray / 255;
        ctx.fillStyle = `rgba(0, ${Math.round(212 * intensity)}, ${Math.round(255 * intensity)}, ${a / 255})`;
      } else if (colorMode === 'green') {
        const intensity = gray / 255;
        ctx.fillStyle = `rgba(0, ${Math.round(255 * intensity)}, 0, ${a / 255})`;
      }

      ctx.fillText(char, x, y);
    }
  }

  // Presets
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const preset = btn.dataset.preset;
      currentPreset = preset;

      if (preset === 'custom') {
        document.getElementById('customCharRow').style.display = 'flex';
        currentChars = document.getElementById('customChars').value || '@%#*+=-:. ';
      } else {
        document.getElementById('customCharRow').style.display = 'none';
        currentChars = charPresets[preset];
      }

      if (imageData) renderPreview();
    });
  });

  document.getElementById('customChars').addEventListener('input', () => {
    if (currentPreset === 'custom') {
      currentChars = document.getElementById('customChars').value || '@%#*+=-:. ';
      if (imageData) renderPreview();
    }
  });

  // Controls with real-time preview
  const controls = ['charSize', 'lineSpacing', 'contrast', 'brightness', 'colorMode'];
  controls.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      const valDisplay = document.getElementById(id + 'Val');
      if (valDisplay) {
        const val = el.value;
        if (id === 'charSize') valDisplay.textContent = val + 'px';
        else if (id === 'lineSpacing') valDisplay.textContent = val + 'x';
        else valDisplay.textContent = val;
      }
      if (imageData) renderPreview();
    });
  });

  let cropXSlider = document.getElementById('cropOffsetX');
  cropXSlider.addEventListener('input', () => { updateLabel('cropOffsetXVal', cropXSlider.value + '%'); renderPreview(); });
  let cropYSlider = document.getElementById('cropOffsetY');
  cropYSlider.addEventListener('input', () => { updateLabel('cropOffsetYVal', cropYSlider.value + '%'); renderPreview(); });

  // Buttons
  document.getElementById('applyBtn').addEventListener('click', () => {
    if (imageData) {
      renderPreview();
      updateStatus('ASCII art rendered! Ready to download.');
    }
  });

  document.getElementById('randomizeBtn').addEventListener('click', () => {
    const presets = Object.keys(charPresets);
    const randomPreset = presets[Math.floor(Math.random() * presets.length)];
    currentPreset = randomPreset;
    currentChars = charPresets[randomPreset];

    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-preset="${randomPreset}"]`).classList.add('active');

    if (imageData) renderPreview();
    updateStatus(`Randomized to ${randomPreset} preset.`);
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!imageData) {
      updateStatus('Please load an image first.');
      return;
    }

    // The canvas is already rendered with the crop applied, so we just export it.
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = canvas.width;
    exportCanvas.height = canvas.height;
    const exportCtx = exportCanvas.getContext('2d');
    // We need to re-render to the export canvas at full res if needed, but for now, just copy
    exportCtx.drawImage(canvas, 0, 0);

    const link = document.createElement('a');
    link.href = exportCanvas.toDataURL('image/png');
    link.download = `ascii-canvas-${Date.now()}.png`;
    link.click();
    updateStatus('Downloaded!');
  });

  function updateStatus(msg) {
    statusBar.textContent = '◈ ' + msg;
  }

  // Load i18n
  // This is handled by the global i18n.js script now

  const incomingImageDataUrl = receiveImage();
  if (incomingImageDataUrl) {
      loadImage(incomingImageDataUrl);
  }
</script>

</body>
</html>
