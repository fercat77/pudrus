<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyer Forge — PUDRUS.XYZ</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">PUDRUS<span>.xyz</span></a>
  <ul class="nav-links">
    <li><a href="../../index.html#tools">All Tools</a></li>
  </ul>
</nav>

<div class="tool-layout">

  <!-- ── PANEL ── -->
  <div class="tool-panel">
    <div class="tool-panel-header">
      <a href="../../index.html" class="back">← Back</a>
      <h2>⎚ Flyer Forge</h2>
      <p>Generate flyers with automatic compositions.</p>
    </div>

    <div class="tool-panel-body">

      <!-- Event Info -->
      <div class="control-group">
        <span class="control-label">Event Information</span>
        <input type="text" id="mainAct" placeholder="Main Act / Event Title" class="text-input">
        <input type="text" id="supportActs" placeholder="Supporting Acts (comma separated)" class="text-input">
        <input type="text" id="date" placeholder="Date & Time" class="text-input">
        <input type="text" id="venue" placeholder="Venue & Address" class="text-input">
      </div>

      <hr class="divider">

      <!-- Layout Template -->
      <div class="control-group">
        <span class="control-label">Layout Template</span>
        <select id="layoutTemplate">
          <option value="topHeavy">Top Heavy</option>
          <option value="centered">Centered</option>
          <option value="bottomBar">Bottom Bar</option>
          <option value="leftAlign">Left Align</option>
        </select>
      </div>

      <!-- Text Style -->
      <div class="control-group">
        <span class="control-label">Text Style</span>
        <div class="control-row">
          <label>Color</label>
          <input type="color" id="textColor" value="#ffffff">
        </div>
        <div class="control-row">
          <label>Font Size</label>
          <input type="range" id="fontSize" min="0.5" max="2.0" step="0.1" value="1.0">
          <span class="val" id="fontSizeVal">1.0x</span>
        </div>
      </div>

    </div>

    <div class="status-bar" id="statusBar">◈ No image loaded</div>

    <div class="action-btns">
      <button class="btn btn-primary" id="applyBtn" style="width:100%">◈ Generate Flyer</button>
      <button class="btn btn-outline" id="resetBtn" style="width:100%">Reset</button>
      <button class="btn btn-outline" id="exportBtn" style="width:100%">Export PNG</button>
    </div>
  </div>

  <!-- ── CANVAS ── -->
  <div class="tool-canvas-area" id="canvasArea">
    <div class="file-upload" id="dropZone">
      <span class="icon">⎚</span>
      <span>Click or drop an image here</span>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="mainCanvas"></canvas>
    <div class="canvas-info" id="canvasInfo">No image loaded</div>
  </div>

</div>

<style>
  .text-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--c3);
    color: var(--text);
    padding: 8px 10px;
    margin-bottom: 8px;
    font-family: var(--font);
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {

  let img = null;
  let canvas = document.getElementById('mainCanvas');
  let ctx = canvas.getContext('2d');

  // --- UI & File Load ---
  const dropZone = document.querySelector('.tool-canvas-area');
  const fileInput = document.getElementById('fileInput');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--c1)'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      img = new Image();
      img.onload = () => {
        const area = document.getElementById('canvasArea');
        const scale = Math.min((area.clientWidth - 40) / img.width, (area.clientHeight - 40) / img.height, 1);
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.style.width = (img.width * scale) + 'px';
        canvas.style.height = (img.height * scale) + 'px';
        ctx.drawImage(img, 0, 0);
        document.getElementById('canvasArea').classList.add('has-image');
        document.getElementById('statusBar').textContent = '◈ Image loaded. Fill info and generate.';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // --- Flyer Generation Logic ---
  function generateFlyer() {
    if (!img) {
      document.getElementById('statusBar').textContent = '◈ Please load an image first.';
      return;
    }

    // Redraw original image
    ctx.drawImage(img, 0, 0);

    const W = canvas.width;
    const H = canvas.height;
    const mainAct = document.getElementById('mainAct').value.toUpperCase();
    const supportActs = document.getElementById('supportActs').value.split(',').map(s => s.trim().toUpperCase());
    const date = document.getElementById('date').value.toUpperCase();
    const venue = document.getElementById('venue').value.toUpperCase();
    const layout = document.getElementById('layoutTemplate').value;
    const color = document.getElementById('textColor').value;
    const sizeMultiplier = parseFloat(document.getElementById('fontSize').value);

    ctx.fillStyle = color;

    // --- Layout Templates ---
    if (layout === 'topHeavy') {
      ctx.textAlign = 'center';
      ctx.font = `bold ${W * 0.15 * sizeMultiplier}px monospace`;
      ctx.fillText(mainAct, W / 2, H * 0.25);

      ctx.font = `${W * 0.04 * sizeMultiplier}px monospace`;
      let yPos = H * 0.75;
      supportActs.forEach(act => {
        ctx.fillText(act, W / 2, yPos);
        yPos += W * 0.05 * sizeMultiplier;
      });
      ctx.fillText(date, W / 2, yPos);
      ctx.fillText(venue, W / 2, yPos + W * 0.05 * sizeMultiplier);
    } else if (layout === 'centered') {
      ctx.textAlign = 'center';
      let yPos = H * 0.3;
      ctx.font = `bold ${W * 0.12 * sizeMultiplier}px monospace`;
      ctx.fillText(mainAct, W / 2, yPos);
      yPos += W * 0.15 * sizeMultiplier;

      ctx.font = `${W * 0.035 * sizeMultiplier}px monospace`;
      supportActs.forEach(act => {
        ctx.fillText(act, W / 2, yPos);
        yPos += W * 0.04 * sizeMultiplier;
      });
      yPos += W * 0.02 * sizeMultiplier;
      ctx.fillText(date, W / 2, yPos);
      ctx.fillText(venue, W / 2, yPos + W * 0.04 * sizeMultiplier);
    } else if (layout === 'bottomBar') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, H * 0.7, W, H * 0.3);
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.font = `bold ${W * 0.08 * sizeMultiplier}px monospace`;
      ctx.fillText(mainAct, W * 0.05, H * 0.8);
      ctx.font = `${W * 0.03 * sizeMultiplier}px monospace`;
      ctx.fillText(`${date} at ${venue}`, W * 0.05, H * 0.9);
      ctx.textAlign = 'right';
      ctx.fillText(supportActs.join(' / '), W * 0.95, H * 0.9);
    } else if (layout === 'leftAlign') {
      ctx.textAlign = 'left';
      let xPos = W * 0.08;
      let yPos = H * 0.2;
      ctx.font = `bold ${W * 0.1 * sizeMultiplier}px monospace`;
      ctx.fillText(mainAct, xPos, yPos);
      yPos += W * 0.12 * sizeMultiplier;

      ctx.font = `${W * 0.03 * sizeMultiplier}px monospace`;
      supportActs.forEach(act => {
        ctx.fillText(act, xPos, yPos);
        yPos += W * 0.04 * sizeMultiplier;
      });
      yPos += W * 0.04 * sizeMultiplier;
      ctx.fillText(date, xPos, yPos);
      ctx.fillText(venue, xPos, yPos + W * 0.04 * sizeMultiplier);
    }
  }

  // --- Event Listeners ---
  document.getElementById('applyBtn').addEventListener('click', generateFlyer);
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (img) ctx.drawImage(img, 0, 0);
  });
  document.getElementById('exportBtn').addEventListener('click', () => {
    if (!img) return;
    const link = document.createElement('a');
    link.download = `pudrus_flyer_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // Real-time update
  ['layoutTemplate', 'textColor', 'fontSize'].forEach(id => {
    document.getElementById(id).addEventListener('input', generateFlyer);
  });
  document.getElementById('fontSize').addEventListener('input', (e) => {
    document.getElementById('fontSizeVal').textContent = e.target.value + 'x';
  });

});
</script>
</body>
</html>
